<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css">

<body class="landing-body">
  <main class="page-layer landing-page">
    <section class="portal-grid" aria-label="Homepage portal">
      <div class="portal-cell portal-index-cell"></div>

      <a class="portal-cell portal-installation-image" href="installation-works.html" aria-label="Go to Installation Works">

      <a class="portal-cell portal-other-rail" href="other-works.html" aria-label="Go to Other Works">

      <div class="portal-cell portal-bottom-rail"></div>

      <span class="portal-number">#001</span>

      <div class="portal-name-wrap">
        <h1 class="portal-name">Ziyi Yuan</h1>

      </div>

      <p class="portal-subtitle">1nteractive<br>Medi@ Artist</p>

      <div class="portal-about-divider">
        <a class="portal-vertical-link" href="about.html">→ About Me</a>

  <script src="glitch-bg.js"></script>
